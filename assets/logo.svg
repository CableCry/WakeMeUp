<svg width="200" height="200" viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="WakeMeUp logo">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="200" y2="200" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#6C5CE7"/>
      <stop offset="1" stop-color="#5A4FCF"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="#5A4FCF" flood-opacity="0.35"/>
    </filter>
  </defs>

  <!-- Rounded app tile -->
  <rect x="12" y="12" width="176" height="176" rx="40" fill="url(#bg)" filter="url(#shadow)"/>

  <!-- Broadcast waves (the "wake" signal) -->
  <g stroke="#A89BFF" stroke-width="7" stroke-linecap="round" fill="none" opacity="0.9">
    <path d="M62 138 A 54 54 0 0 1 138 138"/>
    <path d="M78 138 A 32 32 0 0 1 122 138"/>
  </g>

  <!-- Power symbol -->
  <g stroke="#FFFFFF" stroke-width="11" stroke-linecap="round" fill="none">
    <path d="M75 70 A 40 40 0 1 0 125 70"/>
    <line x1="100" y1="48" x2="100" y2="96"/>
  </g>
</svg>
